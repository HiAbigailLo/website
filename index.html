<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abigail Lo</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <a class="nav__logo" href="#hero">Abigail Lo</a>
    <ul class="nav__links">
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#research">Research</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button class="nav__burger" aria-label="Toggle menu" id="burger">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="nav__drawer" id="drawer">
    <ul>
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#research">Research</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="container">
      <div class="hero__inner">
        <div class="hero__photo-wrap reveal">
          <img src="photos/headshot.jpg" alt="Abigail Lo" class="hero__photo" />
        </div>
        <!-- filled by render.js from content.json → hero -->
        <div class="hero__content reveal" id="hero-content"></div>
      </div>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="about section" id="about">
    <div class="container">
      <h2 class="section__title reveal">About</h2>
      <div class="about__inner reveal">
        <!-- filled by render.js from content.json → about.professional -->
        <div class="about__professional" id="about-professional"></div>
        <div class="about__divider" aria-hidden="true"></div>
        <!-- filled by render.js from content.json → about.beyond -->
        <div class="about__beyond" id="about-beyond"></div>
      </div>
    </div>
  </section>

  <!-- SKILLS -->
  <section class="skills section" id="skills">
    <div class="container">
      <h2 class="section__title reveal">Skills</h2>
      <!-- filled by render.js from content.json → skills -->
      <div class="skills__grid reveal" id="skills-grid"></div>
    </div>
  </section>

  <!-- PROJECTS -->
  <section class="projects section" id="projects">
    <div class="container">
      <h2 class="section__title reveal">Projects</h2>
      <!-- filter buttons filled by render.js from all unique tags across projects -->
      <div id="projects-filters"></div>
      <!-- filled by render.js from content.json → projects (each card gets its own .reveal) -->
      <div class="projects__grid" id="projects-grid"></div>
    </div>
  </section>

  <!-- RESEARCH -->
  <section class="research section" id="research">
    <div class="container">
      <h2 class="section__title reveal">Research</h2>
      <!-- filled by render.js from content.json → research (supports multiple entries) -->
      <div id="research-list"></div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="contact section" id="contact">
    <div class="container">
      <h2 class="section__title reveal">Contact</h2>
      <!-- filled by render.js — links pulled from content.json → hero -->
      <div class="contact__grid reveal" id="contact-grid"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>Abigail Lo · <span id="year"></span></p>
      <p class="footer__updated">Last updated <span id="last-updated"></span></p>
    </div>
  </footer>

  <!-- render.js must load before script.js so content exists when observers run -->
  <script src="render.js"></script>
  <script src="script.js"></script>
</body>
</html>
